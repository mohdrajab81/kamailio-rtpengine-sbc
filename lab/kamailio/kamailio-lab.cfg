#!KAMAILIO
# The "#!KAMAILIO" line is a Kamailio preprocessor directive that identifies
# this file as a Kamailio configuration script. It must appear on the first
# line. Without it, kamailio may refuse to load the file.

# This file is a lab SBC policy.
#
# Paths — two separate planes:
#
#   SIP signaling (bidirectional):
#     carrier <---> Kamailio <---> Vapi
#
#   RTP media (bidirectional):
#     carrier <---> RTPEngine <---> Vapi
#
#   Kamailio -> RTPEngine: control commands only (offer / answer / delete)
#
# IMPORTANT: RTPEngine is NOT in the SIP signaling path. Kamailio sends it
# control commands over a separate UDP control socket to allocate relay ports
# and rewrite SDP bodies. All SIP requests and responses travel only through
# carrier <-> Kamailio <-> Vapi. SIP signaling is bidirectional — responses
# such as 180 Ringing and 200 OK flow from Vapi back through Kamailio to the
# carrier. The architecture diagram is not a one-way pipeline.
#
# Kamailio handles SIP signaling: request validation, routing, header
# normalization, failover, and transaction/dialog behavior.
#
# RTPEngine handles RTP/media anchoring. Kamailio never relays audio itself; it
# only sends control commands to RTPEngine so RTPEngine can rewrite SDP and
# relay RTP.
#
# Main execution model:
#
#   request_route
#     Entry point for every SIP request received by Kamailio.
#     Requests include INVITE, ACK, BYE, CANCEL, OPTIONS, UPDATE, etc.
#     SIP responses such as 180 Ringing, 200 OK, and 503 do NOT enter here.
#
#   route[TO_VAPI]
#     Handles a trusted new inbound INVITE from the carrier side.
#     It extracts ANI, adds context headers, sets the Vapi Request-URI,
#     chooses an upstream destination, and asks RTPEngine to process SDP.
#
#   route[RELAY]
#     Shared helper that performs stateful SIP forwarding through t_relay().
#     Used for the initial INVITE, in-dialog ACK/BYE/re-INVITE, and failover
#     retries. It is not INVITE-specific.
#
#   onreply_route[VAPI_REPLY]
#     Runs for replies to stateful transactions that registered this callback.
#     This is where Kamailio processes SDP answers with rtpengine_answer().
#
#   failure_route[VAPI_FAILOVER]
#     Runs when the selected Vapi destination times out or returns a 408/5xx.
#     It marks the failed destination and tries the next one.

# =============================================================================
# SIP 101 — read this first if you are new to SIP
# =============================================================================
#
# SIP message:
#   The generic term for anything exchanged in SIP. A message is either a
#   request or a response.
#
# SIP request:
#   A command/action sent by one side. Examples: INVITE (start a call),
#   ACK (acknowledge), CANCEL (abort before answer), BYE (end call),
#   OPTIONS (health check). Requests enter request_route in Kamailio.
#
# SIP response:
#   A status reply to a request. Examples: 100 Trying, 180 Ringing,
#   183 Session Progress, 200 OK, 403 Forbidden, 503 Service Unavailable.
#   Responses do NOT enter request_route. Stateful responses are handled
#   by the tm module and can trigger onreply_route or failure_route.
#
# Transaction:
#   One SIP request plus all the responses for that request. Example: one
#   INVITE transaction contains the INVITE and its 100/180/200/503 responses.
#   t_relay() creates and uses transaction state so Kamailio can match
#   responses back to the original request, handle retransmissions, and
#   fire reply/failure callbacks.
#
# Dialog:
#   The longer-lived call relationship established after a successful call
#   setup. A dialog is identified by the Call-ID header plus the From tag
#   and To tag pair. BYE, ACK, and re-INVITE inside an ongoing call are
#   called in-dialog requests.
#
# To tag:
#   A tag parameter the remote side (UAS, here Vapi) adds to the To header
#   in its first non-100 response (e.g. 180 Ringing or 200 OK). Once set,
#   every request inside that call carries the To tag. has_totag() returning
#   true is the standard Kamailio test for "this is an in-dialog request."
#
# Record-Route:
#   A SIP header Kamailio adds on the initial INVITE so that future
#   in-dialog requests (ACK, BYE, re-INVITE) are routed back through
#   Kamailio. Without Record-Route, BYE and re-INVITE would go directly
#   between carrier and Vapi, bypassing this SBC entirely.
#
# Route header:
#   The header that in-dialog requests use to follow the path created by
#   Record-Route. loose_route() reads these Route headers, verifies that
#   Kamailio's own address is present, removes it, and forwards the request
#   to the next hop.
#
# =============================================================================
# SDP / RTP 101
# =============================================================================
#
# SDP (Session Description Protocol):
#   The body carried inside INVITE, 183, and 200 OK messages. SDP describes
#   the media session: "send audio to IP x.x.x.x, port NNNN, using codec G711."
#   RTPEngine rewrites the IP and port in SDP so that audio goes through the
#   SBC relay instead of directly between carrier and Vapi.
#
# RTP (Real-time Transport Protocol):
#   The actual audio packet stream. Kamailio never touches RTP. RTPEngine
#   relays RTP between carrier and Vapi.
#
# Media anchoring:
#   The practice of forcing both sides to send their RTP to RTPEngine instead
#   of directly to each other. This gives the SBC visibility over media (for
#   billing, recording, DTMF detection) and ensures a stable relay path
#   regardless of NAT or changing IPs.
#
# Offer / Answer model:
#   - Offer: the calling side proposes media parameters in the INVITE SDP.
#     rtpengine_offer() processes this and rewrites the SDP before forwarding.
#   - Answer: the called side accepts and proposes its own media parameters
#     in the 200 OK (or 183 early media) SDP.
#     rtpengine_answer() processes this and rewrites it before forwarding back.
#
# =============================================================================
# Pseudo-variable legend
# =============================================================================
#
# Kamailio pseudo-variables (PVs) give access to SIP message fields and
# runtime state. They are read-only or read-write depending on the variable.
#
#   $rm        SIP request method: INVITE, ACK, BYE, CANCEL, OPTIONS, etc.
#   $si        Source IP address of the packet Kamailio received
#   $sp        Source port of the packet Kamailio received
#   $ru        Request-URI — the logical SIP target in the request line
#   $du        Destination URI — the actual next-hop address used by t_relay()
#              $ru and $du can differ: $ru is what the INVITE says it targets,
#              $du is where Kamailio actually sends the packet.
#   $fu        Full From URI, e.g. sip:+971501234567@carrier.example
#   $fU        User part of From URI only, e.g. +971501234567
#   $ai        P-Asserted-Identity header URI when present, $null otherwise
#   $ci        Call-ID — the header tying all messages of one call together
#   $rs        SIP response status code, e.g. 180, 200, 503
#   $rr        SIP response reason phrase, e.g. Ringing, OK, Service Unavailable
#   $var(name) Script-local variable, scoped to the current route execution
#
# =============================================================================
# Normal successful call walkthrough
# =============================================================================
#
#   1.  Carrier sends INVITE with SDP to Kamailio.
#   2.  request_route validates the request, runs sanity/loop/flood checks.
#   3.  request_route verifies the source IP is the trusted carrier.
#   4.  record_route() inserts Kamailio into the dialog path for all future
#       in-dialog requests.
#   5.  route[TO_VAPI] extracts ANI from PAI or From and adds X-Original-Caller.
#   6.  route[TO_VAPI] sets $ru to the Vapi credential-style SIP URI.
#   7.  ds_select_dst() picks a Vapi upstream from dispatcher group 1 and
#       sets $du to the actual network destination.
#   8.  rtpengine_offer() sends the carrier SDP to RTPEngine, which rewrites
#       it so the carrier-side media address points to RTPEngine's relay port.
#   9.  t_on_reply() and t_on_failure() register the response/failure handlers.
#  10.  t_relay() sends the INVITE toward Vapi using $du.
#  11.  Vapi replies 100/180/183/200. Each reply enters onreply_route[VAPI_REPLY].
#  12.  For 183 (early media) or 200 OK with SDP, rtpengine_answer() rewrites
#       the Vapi SDP so the carrier sends RTP to RTPEngine's other relay port.
#  13.  Carrier sends ACK through Kamailio (because Record-Route was inserted).
#  14.  Audio flows bidirectionally: carrier RTP <-> RTPEngine <-> Vapi RTP.
#  15.  Either side sends BYE through Kamailio (again via Record-Route path).
#  16.  rtpengine_delete() removes the media relay session, BYE is relayed.

# =============================================================================
# Preprocessor constants
# =============================================================================
#
# Lines starting with "#!" are Kamailio preprocessor directives, processed
# before the config script is parsed. #!define creates a named text constant
# that the preprocessor substitutes everywhere it appears — similar to #define
# in C. This keeps all environment-specific values in one place.
#
# Production must replace every value below with real addresses and credentials.
# Do not copy these fake lab values into a production deployment.
#!define LAB_SBC_IP          "10.10.10.10"
#!define FAKE_ETISALAT_IP    "10.10.10.20"
#!define LAB_VAPI_DID        "+97145550123"
#!define LAB_VAPI_CREDENTIAL_ID "localcred"

# FAKE_UNTRUSTED_IP is defined here for documentation and test-tooling
# reference — it represents the IP used in negative tests to verify that
# Kamailio rejects untrusted sources. It is intentionally NOT referenced in
# the routing logic below; the trust check rejects any source that is not
# FAKE_ETISALAT_IP rather than matching an explicit untrusted list.
#!define FAKE_UNTRUSTED_IP   "10.10.10.99"

# =============================================================================
# Core runtime parameters
# =============================================================================
#
# These settings favor foreground execution and readable logs for a lab.
# Production uses fork=yes, more children, syslog output, and tuned workers.
#
# debug=3      Log level 3 = INFO and above. Higher values are more verbose.
# log_stderror Print log output to stderr (visible when running in foreground).
# fork=no      Stay in foreground, single process. Never use this in production.
# children=1   One worker process. Production needs multiple to handle load.
# auto_aliases=no  Do not auto-detect additional IP aliases for this host.
debug=3
log_stderror=yes
fork=no
children=1
auto_aliases=no

# Lab SIP listener on UDP port 5060. Receives SIP from the simulated carrier.
# Production should use explicit listen/advertise directives to handle
# public/private address differences, especially on cloud hosts with NAT.
listen=udp:LAB_SBC_IP:5060

# =============================================================================
# Module loading
# =============================================================================
#
# Kamailio loads only the modules listed here. Each .so file adds specific
# functions and parameters available to the config script. Modules not listed
# cannot be used.
#
# sl          Stateless reply engine. Used for immediate local rejects such
#             as 403 Forbidden or 405 Method Not Allowed, where no transaction
#             state needs to be maintained.
# tm          Transaction manager. Core of stateful SIP processing. Provides
#             t_relay(), reply matching, retransmission handling, timeouts,
#             and failure_route / onreply_route callback dispatch.
# rr          Record-Route and loose-route support. Keeps Kamailio in the
#             dialog path for all in-dialog requests.
# maxfwd      Max-Forwards header processing. Detects and rejects SIP loops.
# sanity      SIP message structure validation. Rejects malformed requests
#             before they reach routing logic.
# textops     Header and body text manipulation: append_hf(), remove_hf(),
#             search/replace functions.
# siputils    SIP utility functions: is_method(), has_totag(), etc.
# pv          Pseudo-variable engine. Provides $si, $ru, $fU, $var(), etc.
# xlog        Structured logging from the config script with log levels.
# dispatcher  Upstream destination selection, load balancing, and failover.
# dialog      Dialog state tracking. Required here because uac_replace_from()
#             needs dialog state to restore From headers on later requests.
# uac         UAC header rewrite helpers. uac_replace_from() rewrites the
#             From header and restores it consistently throughout the dialog.
# rtpengine   Client for the RTPEngine control protocol. Provides
#             rtpengine_offer(), rtpengine_answer(), rtpengine_delete().
# pike        Per-source-IP request rate limiter. Lightweight flood protection.
# ctl         kamcmd/binrpc control socket for runtime inspection commands.
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "sanity.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "pv.so"
loadmodule "xlog.so"
loadmodule "dispatcher.so"
loadmodule "dialog.so"
loadmodule "uac.so"
loadmodule "rtpengine.so"
loadmodule "pike.so"
loadmodule "ctl.so"

# =============================================================================
# Module parameters
# =============================================================================

# kamcmd/binrpc control socket path. Used for runtime commands such as:
#   kamcmd dispatcher.list
#   kamcmd tm.stats
modparam("ctl", "binrpc", "unix:/tmp/kamailio_ctl")

# append_fromtag=1: include the From tag value inside the Record-Route header
# parameters. This allows Kamailio to determine which direction an in-dialog
# request is traveling (caller-to-callee vs callee-to-caller), which is needed
# for correct loose-routing and uac From-header restoration.
modparam("rr", "append_fromtag", 1)

# Transaction timer values (in milliseconds).
#
# fr_timer:     How long to wait for a final reply to a non-INVITE request,
#               for the first reply to an INVITE before provisional response,
#               or for the ACK to a negative INVITE final response.
#               Lab uses 3000 ms; Kamailio default is 30000 ms.
# fr_inv_timer: How long to wait for a final response to an INVITE after a
#               provisional response was received. It can restart on
#               provisional replies. Lab uses 6000 ms; Kamailio default is
#               120000 ms. When this timer expires, tm fires failure_route
#               with a 408.
modparam("tm", "fr_timer", 3000)
modparam("tm", "fr_inv_timer", 6000)

# Dispatcher upstream destination list.
#
# dispatcher.list format (whitespace-separated columns):
#
#   setid  destination                           flags  priority  attrs
#   1      sip:10.10.10.41:5070;transport=udp    0      10        duid=vapi-a
#   1      sip:10.10.10.42:5080;transport=udp    0      10        duid=vapi-b
#
# Column meanings:
#   setid:       Group number. ds_select_dst("1",...) selects from setid 1.
#   destination: The actual SIP next-hop URI. Becomes $du when selected.
#   flags:       Per-destination option flags (0 = none).
#   priority:    Weight used by priority-based algorithms. Equal weights here
#                mean all destinations are treated equally.
#   attrs:       Free-form key=value pairs. duid=vapi-a/vapi-b are human-
#                readable identifiers for the two simulated Vapi upstreams.
modparam("dispatcher", "list_file", "/home/dev/sip-lab/kamailio/dispatcher.list")

# flags=2 enables per-destination state tracking (active / inactive / probing).
# This is required for ds_mark_dst() and ds_next_dst() to work in failure_route.
# Without it, failover cannot mark a destination as bad and skip it.
modparam("dispatcher", "flags", 2)

# xavp_dst names the XAVP container where dispatcher stores the selected
# destination and its attributes. ds_next_dst() reads from this container to
# advance to the next available destination during failover.
modparam("dispatcher", "xavp_dst", "_dsdst_")

# ds_ping_interval=0 disables active OPTIONS-based health probing in the lab.
# Production should enable probing so dead destinations are detected and removed
# from the active set before a live call hits them.
modparam("dispatcher", "ds_ping_interval", 0)

# force_dst=1 allows ds_select_dst() to overwrite $du even if it already holds
# a value. Required here because some code paths may set $du before dispatcher
# runs.
modparam("dispatcher", "force_dst", 1)

# uac restore_mode=auto: automatically restore the original From header on
# subsequent in-dialog requests after uac_replace_from() was used.
# restore_dlg=1: use the dialog module to maintain From-restore state, which
# is required when the call may last beyond a single transaction.
modparam("uac", "restore_mode", "auto")
modparam("uac", "restore_dlg", 1)

# RTPEngine control socket. This UDP address is the control channel between
# Kamailio and RTPEngine. It carries only offer/answer/delete control commands,
# NOT media/RTP traffic. RTPEngine opens its own UDP ports for RTP separately.
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:2223")

# rtpengine_disable_tout: seconds after which an unresponsive RTPEngine
# instance is marked disabled and skipped for new sessions.
modparam("rtpengine", "rtpengine_disable_tout", 20)

# aggressive_redetection=1: re-check a disabled RTPEngine instance more
# frequently so it is re-enabled quickly after recovery.
modparam("rtpengine", "aggressive_redetection", 1)

# rtpengine_tout_ms: milliseconds to wait for a single control command reply
# before considering it a timeout.
modparam("rtpengine", "rtpengine_tout_ms", 2000)

# rtpengine_retr: number of times to retry a control command that timed out
# before giving up and reporting failure to the config script.
modparam("rtpengine", "rtpengine_retr", 2)

# Pike rate limiting parameters.
# sampling_time_unit:    measurement window in seconds.
# reqs_density_per_unit: maximum requests per source IP allowed in that window.
# remove_latency:        seconds to keep a blocked source in the block table.
# These values are deliberately permissive for lab use. Production limits must
# be based on expected CPS, OPTIONS keepalive rate, and carrier burst behavior.
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 20)
modparam("pike", "remove_latency", 30)

# =============================================================================
# request_route — main SIP request entry point
# =============================================================================
#
# Every SIP REQUEST received by Kamailio enters here first.
# SIP RESPONSES do not enter here; they are matched by tm to the originating
# transaction and dispatched to onreply_route or failure_route.
request_route {
    xlog("L_INFO", "incoming $rm from $si:$sp RURI=$ru From=$fu PAI=$ai Call-ID=$ci\n");

    # Loop protection. Max-Forwards is decremented by each SIP proxy. When it
    # reaches 0, the request is rejected with 483 Too Many Hops. The "10" value
    # is inserted only if the request arrives without a Max-Forwards header.
    # Existing non-zero Max-Forwards values are decremented, not capped.
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # sanity_check(msg_checks, uri_checks)
    #
    # Validates the structure of the incoming SIP message before any routing
    # or media work is done. Rejects garbage early and cheaply.
    #
    # First argument — 1511 — is a bitmask selecting which checks to run.
    # Each set bit enables one structural validation, for example:
    #   - Request-URI scheme is sip: or sips:
    #   - Required headers (To, From, Via, CSeq, Call-ID) are all present
    #   - Content-Length matches the actual body size
    #   - Via header is well-formed
    #   - CSeq method matches the request method
    # The exact bit-to-check mapping is documented in the Kamailio sanity
    # module reference; values differ slightly across Kamailio versions.
    #
    # Second argument — 7 — selects which URIs are parsed when the 1024
    # "parse uri" check is enabled:
    #   1 = Request-URI
    #   2 = From URI
    #   4 = To URI
    # 7 = 1+2+4: parse Request-URI, From URI, and To URI.
    #
    # The sanity module sends a precise SL error reply itself when autodrop is
    # enabled, which is the default. Do not send a second generic 400 here.
    if (!sanity_check("1511", "7")) {
        exit;
    }

    # Per-source-IP flood control. pike_check_req() tracks request rate per
    # source IP and returns false when the rate exceeds the configured limit.
    # In production, tune sampling_time_unit and reqs_density_per_unit so that
    # legitimate carrier bursts and OPTIONS keepalives are never blocked.
    if (!pike_check_req()) {
        xlog("L_ALERT", "PIKE blocked $si:$sp Call-ID=$ci\n");
        sl_send_reply("503", "Rate Limit Exceeded");
        exit;
    }

    # OPTIONS is answered here, before the trusted-source check below.
    # This means ANY IP can send OPTIONS and get a 200 OK — useful for carrier
    # keepalives that may come from load-balanced source IPs. For a public
    # production SBC, move this check after the trusted-source gate or restrict
    # it to known carrier IP ranges to prevent information leakage.
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # In-dialog detection.
    #
    # The To tag is absent on the very first INVITE. Once Vapi sends its first
    # non-100 response (typically 180 Ringing), it sets a To tag. Every request
    # inside that call from that point forward — ACK, BYE, re-INVITE, UPDATE —
    # carries the To tag. has_totag() returning true means this request belongs
    # to an already-established dialog and should NOT go through new-call logic.
    #
    # In-dialog requests are processed here before the trusted-source check
    # because they were already authorized on the initial INVITE.
    if (has_totag()) {

        # loose_route() inspects the Route header set that was built from the
        # Record-Route headers Kamailio inserted on the initial INVITE. The
        # Route header contains Kamailio's own SIP URI. loose_route() confirms
        # it, removes Kamailio's entry, and sets up forwarding to the next hop.
        # This is the standard RFC 3261 loose-routing mechanism.
        if (loose_route()) {
            # BYE ends the call. Relay the SIP BYE through Kamailio, but also
            # explicitly remove the RTPEngine media session, because RTPEngine
            # holds relay state (port allocations, counters) that must be freed.
            # The RTP relay does not self-terminate on BYE — Kamailio must tell
            # RTPEngine to clean up via rtpengine_delete().
            if (is_method("BYE")) {
                xlog("L_INFO", "BYE deleting RTPEngine Call-ID=$ci\n");
                rtpengine_delete();
            }

            # In-dialog re-INVITE or UPDATE can renegotiate media: hold/resume,
            # codec changes, or media address changes. If such a request carries
            # SDP, it must be passed through RTPEngine before relay, otherwise
            # the endpoints may negotiate a direct carrier <-> Vapi media path
            # and bypass the relay.
            if (is_method("INVITE|UPDATE") && has_body("application/sdp")) {
                xlog("L_INFO", "Calling rtpengine_offer for in-dialog $rm Call-ID=$ci\n");
                if (!rtpengine_offer("trust-address replace-origin replace-session-connection")) {
                    sl_send_reply("500", "RTP Engine Offer Failed");
                    exit;
                }

                # Register a reply callback for the matching 18x/2xx response
                # so rtpengine_answer() can rewrite the answer SDP.
                t_on_reply("VAPI_REPLY");
            }
            route(RELAY);
            exit;
        }

        # ACK for a non-2xx final response (4xx, 5xx, 6xx).
        #
        # Why this branch is reached: loose_route() failed above because for
        # error responses, Kamailio does not always include Record-Route, so the
        # ACK for that error may arrive without a Route header. loose_route()
        # finds nothing to process and returns false, falling through to here.
        #
        # Contrast with ACK for 200 OK: a successful 200 OK always carries the
        # Record-Route set, so the ACK has a Route header, and loose_route()
        # succeeds and handles it in the block above.
        #
        # t_check_trans() confirms that Kamailio's transaction engine still has
        # a matching INVITE transaction for this ACK. This prevents stray ACKs
        # from being relayed for calls Kamailio no longer knows about.
        if (is_method("ACK")) {
            if (t_check_trans()) {
                route(RELAY);
                exit;
            }
            exit;
        }

        # Any other in-dialog request that passed neither loose_route() nor the
        # ACK check is unexpected. Respond with 404.
        sl_send_reply("404", "Not here");
        exit;
    }

    # Source trust enforcement for new (out-of-dialog) requests.
    # $si is the source IP address of the packet. Only the simulated carrier IP
    # is trusted in this lab. Production must replace this with a proper
    # allowlist that may include multiple carrier IPs, transport type checks,
    # and potentially TLS certificate validation.
    if ($si != FAKE_ETISALAT_IP) {
        xlog("L_WARN", "Rejected SIP from untrusted source $si:$sp Call-ID=$ci\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }

    # CANCEL handling.
    #
    # CANCEL is a SIP request (not a response). The caller sends it to abort a
    # pending INVITE before Vapi sends a final response (200 OK, 4xx, etc.).
    # CANCEL must be matched to the original INVITE transaction.
    #
    # If a matching INVITE transaction exists:
    #   - Delete any RTPEngine media session that rtpengine_offer() may have
    #     created for this Call-ID. rtpengine_delete() is safe to call even if
    #     rtpengine_offer() was never called (e.g. the INVITE had no SDP body);
    #     RTPEngine silently ignores a delete for an unknown session.
    #   - Relay the CANCEL upstream so Vapi also receives it.
    #
    # If no matching transaction exists, log a warning and discard.
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            xlog("L_INFO", "CANCEL matched transaction, deleting RTPEngine Call-ID=$ci\n");
            rtpengine_delete();
            if (!t_relay()) {
                xlog("L_ERR", "CANCEL t_relay failed Call-ID=$ci\n");
            }
        } else {
            xlog("L_WARN", "CANCEL has no matching transaction Call-ID=$ci\n");
        }
        exit;
    }

    # This lab service accepts only new inbound INVITE calls. Any other
    # out-of-dialog method that passed the trusted-source check above (e.g.
    # REGISTER, SUBSCRIBE, NOTIFY) is rejected here.
    if (!is_method("INVITE")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # record_route() inserts a Route header containing Kamailio's own SIP URI
    # into the INVITE before it is forwarded. Vapi echoes this back in its
    # 200 OK, and the carrier's ACK carries it as a Route header. This is how
    # Kamailio stays in the signaling path for every subsequent in-dialog
    # request (ACK, BYE, re-INVITE) for the lifetime of the call.
    record_route();
    route(TO_VAPI);
    exit;
}

# =============================================================================
# route[TO_VAPI] — prepare and dispatch a trusted new carrier INVITE to Vapi
# =============================================================================
route[TO_VAPI] {
    $var(ani) = "";

    # ANI (Automatic Number Identification) / caller identity extraction.
    #
    # Policy (in priority order):
    #   1. P-Asserted-Identity (PAI) header, when present. PAI is set by the
    #      carrier's network and is more authoritative than From.
    #   2. From URI user part ($fU) as fallback if PAI is absent or empty.
    #   3. "unknown" if neither source provides a usable identity.
    #
    # $ai holds the full PAI URI, e.g. sip:+971501234567@etisalat.ae, or
    # $null if the header is absent.
    # $(ai{uri.user}) applies the uri.user transformation to extract only the
    # user part, e.g. +971501234567, stripping the domain.
    if ($ai != $null && $ai != "") {
        $var(ani) = $(ai{uri.user});
    }

    if ($var(ani) == "") {
        $var(ani) = $fU;
    }

    if ($var(ani) == "") {
        $var(ani) = "unknown";
    }

    xlog("L_INFO", "Extracted ANI=$var(ani) FromUser=$fU PAI=$ai Call-ID=$ci\n");

    # Inject caller identity as custom SIP headers so the Vapi AI platform
    # can read the caller number without parsing PAI or From itself.
    #
    # The lab adds both hyphen and underscore variants to demonstrate both
    # forms. Production should settle on one canonical header name after
    # confirming which form the AI platform reads. Note: header names with
    # underscore (X-Original_Caller) are non-standard and may be rejected or
    # silently mangled by some SIP proxies and SBCs. Hyphen is safer.
    append_hf("X-Original-Caller: $var(ani)\r\n");
    append_hf("X-Original_Caller: $var(ani)\r\n");

    # From header normalization.
    #
    # If PAI identifies a different caller than the From header, rewrite From
    # to match the PAI-derived ANI so Vapi sees a consistent caller identity
    # in the standard From header.
    #
    # uac_replace_from(display_name, new_uri):
    #   First argument  "":               keep the existing From display name.
    #   Second argument new_from_uri:     the new From URI to write.
    #
    # dlg_manage() must be called before uac_replace_from() when rewriting From
    # on a new INVITE. The dialog module tracks the From rewrite so the uac
    # module can restore the original From on subsequent in-dialog requests
    # (BYE, re-INVITE), keeping the carrier's view of the dialog consistent.
    if ($ai != $null && $ai != "" && $(ai{uri.user}) != "" && $(ai{uri.user}) != $fU) {
        dlg_manage();
        $var(new_from_uri) = "sip:" + $var(ani) + "@etisalat.local";
        uac_replace_from("", $var(new_from_uri));
        xlog("L_INFO", "Rewrote From to $var(new_from_uri) Call-ID=$ci\n");
    }

    # Set the logical Request-URI ($ru) for Vapi.
    #
    # This URI identifies the target DID and Vapi credential. It will appear
    # in the SIP Request-URI field of the INVITE that Vapi receives.
    # $ru is the logical target; $du (set by dispatcher below) is the actual
    # network address Kamailio sends the packet to. They are intentionally
    # different: $ru is what Vapi sees, $du is where the packet actually goes.
    $ru = "sip:" + LAB_VAPI_DID + "@" + LAB_VAPI_CREDENTIAL_ID + ".sip.vapi.ai";

    # ds_select_dst(setid, algorithm, mode)
    #
    # Selects one destination from dispatcher group 1 and writes it to $du.
    #
    # setid "1":     Use entries with setid=1 in dispatcher.list.
    # algorithm "0": Round-robin selection. Other options: 4 = hash by Call-ID
    #                (same call always hits same destination), 8 = random.
    # mode "2":      Controls how the selected destination is stored in the
    #                _dsdst_ XAVP. Mode 2 stores the full destination set in
    #                the XAVP so ds_next_dst() can iterate through remaining
    #                destinations during failover in failure_route.
    #
    # Returns false if no active destinations are available in the group.
    if (!ds_select_dst("1", "0", "2")) {
        sl_send_reply("503", "No Vapi destination available");
        exit;
    }

    xlog("L_INFO", "Routing to du=$du while preserving RURI=$ru Call-ID=$ci\n");

    # RTPEngine offer processing.
    #
    # rtpengine_offer() sends the carrier's SDP offer to RTPEngine over the
    # control socket. RTPEngine:
    #   1. Allocates a pair of UDP relay ports for this session.
    #   2. Records the carrier's media address and codec parameters.
    #   3. Rewrites the SDP body so the IP/port in it points to RTPEngine's
    #      relay ports rather than the carrier's real media address.
    # The modified SDP is written back into the SIP message body before
    # t_relay() sends it to Vapi. Vapi therefore sends its RTP to RTPEngine,
    # not directly to the carrier.
    #
    # Flags used:
    #   trust-address:              Accept the IP in the SDP c= line as the
    #                               intended media endpoint. Needed when the
    #                               carrier is behind NAT or advertises a media
    #                               IP different from its SIP source address.
    #   replace-origin:             Rewrite the SDP o= (origin) line IP address
    #                               to RTPEngine's own IP.
    #   replace-session-connection: Rewrite the SDP c= (connection) line IP
    #                               address to RTPEngine's relay IP. This is the
    #                               critical flag that forces Vapi to send RTP
    #                               toward RTPEngine instead of the carrier.
    if (has_body("application/sdp")) {
        xlog("L_INFO", "Calling rtpengine_offer Call-ID=$ci\n");
        if (!rtpengine_offer("trust-address replace-origin replace-session-connection")) {
            sl_send_reply("500", "RTP Engine Offer Failed");
            exit;
        }
    }

    # Register transaction callbacks before calling t_relay().
    # These must be set before the request is forwarded, not after.
    #
    # t_on_reply("VAPI_REPLY"):    Run onreply_route[VAPI_REPLY] for every
    #                              response received for this transaction
    #                              (100, 180, 183, 200, 4xx, 5xx, etc.).
    # t_on_failure("VAPI_FAILOVER"): Run failure_route[VAPI_FAILOVER] when
    #                              the transaction receives a 408 timeout or
    #                              a 5xx server error from Vapi.
    t_on_reply("VAPI_REPLY");
    t_on_failure("VAPI_FAILOVER");
    route(RELAY);
}

# =============================================================================
# route[RELAY] — stateful SIP forwarding
# =============================================================================
#
# Shared forwarding helper. Called for the initial INVITE, for in-dialog
# requests (ACK, BYE, re-INVITE), and for failover retries.
#
# t_relay() does three things:
#   1. Forwards the SIP request to $du (or $ru if $du is not set).
#   2. Creates or reuses a transaction record so responses can be matched back.
#   3. Enables the reply/failure callbacks registered by t_on_reply() and
#      t_on_failure() to fire when responses arrive.
#
# If t_relay() fails at the network layer (no route to host, DNS failure, etc.)
# before a transaction is fully set up, sl_reply_error() sends a 500 Internal
# Server Error back to the sender using the stateless layer (sl module), since
# the tm transaction may not yet be established.
route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# =============================================================================
# onreply_route[VAPI_REPLY] — handle registered transaction responses
# =============================================================================
#
# This route runs for every SIP RESPONSE received for a transaction that called
# t_on_reply("VAPI_REPLY"). It does not run for requests.
#
# $rs = response status code (e.g. 180, 200, 503)
# $rr = response reason phrase (e.g. Ringing, OK, Service Unavailable)
#
# Typical response sequence:
#   100 Trying          — Vapi acknowledges the INVITE (no SDP)
#   180 Ringing         — Vapi is ringing the AI agent (may or may not have SDP)
#   183 Session Progress — Vapi sends early media SDP (see below)
#   200 OK              — call answered; usually has SDP for ordinary calls
onreply_route[VAPI_REPLY] {
    xlog("L_INFO", "Reply $rs $rr Call-ID=$ci\n");

    # Process SDP in 18x (provisional) or 2xx (successful) responses.
    #
    # 183 Session Progress with SDP = early media.
    #   Some AI platforms start sending audio immediately in a 183 before
    #   formally answering with 200 OK. The other endpoint must receive
    #   RTPEngine relay addresses as early as the 183 so it can send RTP toward
    #   RTPEngine. rtpengine_answer() must therefore run on 183 with SDP, not
    #   only on 200 OK.
    #
    # 200 OK with SDP = standard call answer.
    #   rtpengine_answer() processes the response SDP, rewrites the IP/port to
    #   the appropriate RTPEngine relay address, and writes the modified SDP
    #   back into the response body before it is forwarded.
    #
    # After both offer (from the carrier INVITE) and answer (from this response)
    # have been processed, the complete bidirectional media path is:
    #
    #   carrier RTP  <-->  RTPEngine  <-->  Vapi RTP
    #
    # Responses other than 18x/2xx (e.g. 100, 4xx, 5xx) are forwarded as-is
    # by tm without entering this conditional block.
    if (status=~"(18[0-9]|2[0-9][0-9])" && has_body("application/sdp")) {
        xlog("L_INFO", "Calling rtpengine_answer Call-ID=$ci\n");
        if (!rtpengine_answer("trust-address replace-origin replace-session-connection")) {
            xlog("L_ERR", "rtpengine_answer failed Call-ID=$ci\n");
        }
    }
}

# =============================================================================
# failure_route[VAPI_FAILOVER] — handle Vapi call setup failure
# =============================================================================
#
# This route runs when the Vapi-bound INVITE transaction fails during call
# setup. It handles setup-time failover only — it does not handle mid-call
# media failure. If Vapi fails after the call is answered, that is a different
# problem not addressed here.
failure_route[VAPI_FAILOVER] {

    # If the caller sent CANCEL while we were waiting for Vapi, the call is
    # already gone. Do not attempt a retry — there is no live caller to connect.
    if (t_is_canceled()) {
        exit;
    }

    # Retry on timeout or server-side error only.
    #
    # 408 Request Timeout: Vapi did not send any final response before the
    #     transaction timer expired. The destination is likely down.
    # 5xx Server Error: Vapi responded but reported an internal failure.
    #
    # 4xx client errors (401, 403, 404, 486, etc.) are NOT retried because they
    # indicate Vapi actively rejected the request. Sending the same INVITE to a
    # different destination would likely fail for the same reason.
    if (t_check_status("408|5[0-9][0-9]")) {
        xlog("L_WARN", "Destination failed, trying next destination Call-ID=$ci\n");

        # ds_mark_dst("ip") marks the failed destination with two flags:
        #   i = inactive:  exclude it from future ds_select_dst() selections.
        #   p = probing:   send periodic OPTIONS pings so it can be re-enabled
        #                  automatically when it recovers.
        # Other valid values: "i" (inactive, no probing), "p" (probing only),
        # "a" (force back to active). "ip" is the standard failover choice.
        ds_mark_dst("ip");

        # ds_next_dst() advances $du to the next available destination in the
        # _dsdst_ XAVP set that was populated by ds_select_dst() in route[TO_VAPI].
        # Returns true if another destination exists, false if all are exhausted.
        if (ds_next_dst()) {

            # The first attempt already called rtpengine_offer(), so RTPEngine
            # holds a media session for this Call-ID keyed to the first
            # destination's SDP exchange. That session must be removed before
            # creating a new one for the next destination.
            #
            # Important: serial failover after an SDP rewrite must be validated
            # with packet traces for the target provider behavior. The lab uses
            # this path as a candidate and verifies it with tshark evidence.
            if (has_body("application/sdp")) {
                xlog("L_INFO", "Deleting RTP state before failover re-offer Call-ID=$ci\n");
                rtpengine_delete();
                if (!rtpengine_offer("trust-address replace-origin replace-session-connection")) {
                    xlog("L_ERR", "rtpengine re-offer failed Call-ID=$ci\n");
                    exit;
                }
            }

            # Re-register reply and failure callbacks for the new branch, then
            # relay the INVITE to the next destination.
            t_on_reply("VAPI_REPLY");
            t_on_failure("VAPI_FAILOVER");
            route(RELAY);
            exit;
        }

        # All dispatcher destinations have been tried and failed.
        # Remove the RTPEngine media session created during the failed attempt.
        #
        # No explicit SIP reply is sent here. When failure_route exits without
        # sending a reply, the tm module automatically propagates the last
        # received upstream failure response (e.g. the 503 or 408 from Vapi)
        # back to the carrier as the final response to the original INVITE.
        # This is the default tm behavior for unhandled failure cases.
        xlog("L_ERR", "No more destinations; deleting RTPEngine state Call-ID=$ci\n");
        rtpengine_delete();
    }
}
